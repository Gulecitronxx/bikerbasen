<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opret konto - BikerBasen</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* HEADER */
        header {
            background: white;
            border-bottom: 1px solid #e0e0e0;
            padding: 1.5rem 2rem;
        }

        .header-content {
            max-width: 400px;
            margin: 0 auto;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: #ff6600;
            text-decoration: none;
            display: inline-block;
        }

        .logo:hover {
            opacity: 0.8;
        }

        /* MAIN CONTENT */
        .signup-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .signup-box {
            background: white;
            border-radius: 8px;
            padding: 2.5rem;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }

        .signup-title {
            font-size: 24px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 0.5rem;
            text-align: center;
        }

        .signup-subtitle {
            font-size: 14px;
            color: #999;
            text-align: center;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #333;
            margin-bottom: 0.5rem;
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            font-family: 'Roboto', sans-serif;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #ff6600;
            box-shadow: 0 0 0 3px rgba(255, 102, 0, 0.1);
        }

        .password-requirements {
            font-size: 12px;
            color: #999;
            margin-top: 0.5rem;
        }

        .checkbox-group {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            font-size: 12px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #ff6600;
            flex-shrink: 0;
        }

        .checkbox-group label {
            cursor: pointer;
            margin: 0;
            color: #666;
            line-height: 1.3;
        }

        .checkbox-group a {
            color: #0066cc;
            text-decoration: none;
        }

        .checkbox-group a:hover {
            text-decoration: underline;
        }

        .signup-button {
            width: 100%;
            padding: 12px;
            background: #ff6600;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            font-family: 'Roboto', sans-serif;
        }

        .signup-button:hover {
            background: #e55a00;
        }

        .signup-button:active {
            transform: scale(0.98);
        }

        .divider {
            text-align: center;
            margin: 1.5rem 0;
            font-size: 13px;
            color: #999;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #e0e0e0;
        }

        .divider span {
            background: white;
            padding: 0 0.5rem;
            position: relative;
        }

        .login-section {
            text-align: center;
            font-size: 13px;
            color: #666;
        }

        .login-section a {
            color: #ff6600;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .login-section a:hover {
            color: #e55a00;
        }

        /* SOCIAL LOGIN */
        .social-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .social-button {
            padding: 10px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .social-button:hover {
            border-color: #ff6600;
            background: #fff9f5;
        }

        .success-message {
            display: none;
            padding: 1rem;
            background: #e8f5e9;
            color: #2e7d32;
            border-radius: 4px;
            text-align: center;
            font-size: 13px;
            margin-bottom: 1rem;
        }

        /* RESPONSIVE */
        @media (max-width: 600px) {
            header {
                padding: 1rem;
            }

            .signup-box {
                padding: 1.5rem;
                border-radius: 8px;
            }

            .signup-title {
                font-size: 20px;
            }

            .signup-container {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <header>
        <div class="header-content">
            <a href="index.html" class="logo">BikerBasen</a>
        </div>
    </header>

    <!-- SIGNUP CONTAINER -->
    <div class="signup-container">
        <div class="signup-box">
            <div class="success-message" id="successMessage">
                Konto oprettet! Logget ind automatisk...
            </div>

            <h1 class="signup-title">Opret konto</h1>
            <p class="signup-subtitle">og start med at sælge dine motorcykler</p>

            <form id="signupForm" onsubmit="handleSignup(event)">
                <div class="form-group">
                    <label for="fullname">Fuldt navn</label>
                    <input 
                        type="text" 
                        id="fullname" 
                        placeholder="Dit navn" 
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input 
                        type="email" 
                        id="email" 
                        placeholder="din@email.dk" 
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="phone">Telefon (valgfrit)</label>
                    <input 
                        type="tel" 
                        id="phone" 
                        placeholder="+45 12 34 56 78"
                    >
                </div>

                <div class="form-group">
                    <label for="password">Adgangskode</label>
                    <input 
                        type="password" 
                        id="password" 
                        placeholder="Mindst 6 karakterer" 
                        required
                    >
                    <div class="password-requirements">
                        Skal være mindst 6 karakterer lang
                    </div>
                </div>

                <div class="form-group">
                    <label for="password-confirm">Bekræft adgangskode</label>
                    <input 
                        type="password" 
                        id="password-confirm" 
                        placeholder="Gentag adgangskoden" 
                        required
                    >
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="terms" required>
                    <label for="terms">
                        Jeg accepterer <a href="#">vilkår og betingelser</a>
                    </label>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="newsletter">
                    <label for="newsletter">
                        Send mig nyheder og tilbud fra BikerBasen
                    </label>
                </div>

                <button type="submit" class="signup-button">Opret gratis konto</button>
            </form>

            <div class="divider">
                <span>eller</span>
            </div>

            <div class="social-buttons">
                <button class="social-button" type="button" onclick="signupWith('Google')">
                    🔵 Google
                </button>
                <button class="social-button" type="button" onclick="signupWith('Facebook')">
                    👤 Facebook
                </button>
            </div>

            <div class="login-section">
                Har du allerede en konto? 
                <a href="login.html">Log ind her</a>
            </div>
        </div>
    </div>

    <script>
        function handleSignup(event) {
            event.preventDefault();

            const fullname = document.getElementById('fullname').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const passwordConfirm = document.getElementById('password-confirm').value;
            const terms = document.getElementById('terms').checked;

            // Validering
            if (password !== passwordConfirm) {
                alert('Adgangskoderne matcher ikke!');
                return;
            }

            if (password.length < 6) {
                alert('Adgangskoden skal være mindst 6 karakterer!');
                return;
            }

            if (!terms) {
                alert('Du skal acceptere vilkår og betingelser!');
                return;
            }

            // Gem brugerdata
            localStorage.setItem('userName', fullname);
            localStorage.setItem('userEmail', email);
            localStorage.setItem('userLoggedIn', 'true');

            // Vis success besked
            document.getElementById('signupForm').style.display = 'none';
            document.getElementById('successMessage').style.display = 'block';

            // Redirect efter 2 sekunder
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 2000);
        }

        function signupWith(provider) {
            alert(`Opret med ${provider} ville blive implementeret her`);
        }
    </script>
</body>
</html>
