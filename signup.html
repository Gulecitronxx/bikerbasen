<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opret konto - BikerBasen</title>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-RWJZ8NJB0C"></script>
    <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-RWJZ8NJB0C');</script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>const sb=window.supabase.createClient('https://dxefcvlerxugymjfjgoe.supabase.co','sb_publishable_05IjuXC5ZJO912AGP-qZ4Q_IujZju7U');</script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:linear-gradient(135deg,#f5f5f5,#e8e8e8);min-height:100vh;display:flex;flex-direction:column;}
        header{background:white;border-bottom:1px solid #e0e0e0;padding:1.25rem 2rem;}
        .logo{font-size:22px;font-weight:700;color:#ff6600;text-decoration:none;}
        .wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem;}
        .box{background:white;border-radius:8px;padding:2.5rem;box-shadow:0 4px 16px rgba(0,0,0,0.1);width:100%;max-width:420px;}
        .box-title{font-size:22px;font-weight:700;color:#333;margin-bottom:0.25rem;text-align:center;}
        .box-sub{font-size:13px;color:#999;text-align:center;margin-bottom:2rem;}
        .field{margin-bottom:1.25rem;}
        .field label{display:block;font-size:13px;font-weight:500;color:#555;margin-bottom:5px;}
        .field input{width:100%;padding:11px 14px;border:1px solid #ddd;border-radius:6px;font-size:14px;font-family:inherit;transition:border-color 0.2s;}
        .field input:focus{outline:none;border-color:#ff6600;box-shadow:0 0 0 3px rgba(255,102,0,0.1);}
        .hint{font-size:11px;color:#aaa;margin-top:4px;}
        .cb-wrap{display:flex;gap:8px;margin-bottom:1.25rem;font-size:12px;align-items:flex-start;}
        .cb-wrap input{width:16px;height:16px;accent-color:#ff6600;flex-shrink:0;margin-top:1px;}
        .cb-wrap a{color:#0066cc;text-decoration:none;}
        .btn{width:100%;padding:12px;background:#ff6600;color:white;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:background 0.2s;}
        .btn:hover{background:#e55a00;}
        .btn:disabled{background:#ccc;cursor:not-allowed;}
        .alert{padding:10px 14px;border-radius:6px;font-size:13px;margin-bottom:1rem;display:none;}
        .alert-err{background:#fff0f0;border:1px solid #ffcccc;color:#cc0000;}
        .alert-ok{background:#f0fff4;border:1px solid #9ae6b4;color:#276749;}
        .bottom{text-align:center;font-size:13px;color:#666;margin-top:1.5rem;}
        .bottom a{color:#ff6600;text-decoration:none;font-weight:600;}
    </style>
</head>
<body>
<header><a href="index.html" class="logo">🏍️ BikerBasen</a></header>
<div class="wrap">
    <div class="box">
        <div class="box-title">Opret konto</div>
        <div class="box-sub">Gratis — og klar på under 1 minut</div>
        <div class="alert alert-err" id="err"></div>
        <div class="alert alert-ok" id="ok"></div>
        <div id="formContent">
            <div class="field"><label>Fuldt navn</label><input type="text" id="name" placeholder="Dit navn"></div>
            <div class="field"><label>Email</label><input type="email" id="email" placeholder="din@email.dk"></div>
            <div class="field"><label>Telefon (valgfrit)</label><input type="tel" id="phone" placeholder="+45 12 34 56 78"></div>
            <div class="field">
                <label>Adgangskode</label>
                <input type="password" id="pw" placeholder="Mindst 6 tegn">
                <div class="hint">Mindst 6 tegn</div>
            </div>
            <div class="field"><label>Bekræft adgangskode</label><input type="password" id="pw2" placeholder="Gentag adgangskode"></div>
            <div class="cb-wrap">
                <input type="checkbox" id="terms">
                <label for="terms">Jeg accepterer <a href="#">vilkår og betingelser</a></label>
            </div>
            <button class="btn" id="btn" onclick="signup()">Opret gratis konto</button>
        </div>
        <div class="bottom">Har du allerede en konto? <a href="login.html">Log ind her</a></div>
    </div>
</div>
<script>
    sb.auth.getSession().then(({data:{session}})=>{ if(session) window.location.href='index.html'; });

    async function signup() {
        const name = document.getElementById('name').value.trim();
        const email = document.getElementById('email').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const pw = document.getElementById('pw').value;
        const pw2 = document.getElementById('pw2').value;
        const terms = document.getElementById('terms').checked;
        const btn = document.getElementById('btn');

        document.getElementById('err').style.display = 'none';

        if (!name) { showErr('Skriv dit navn'); return; }
        if (!email) { showErr('Skriv din email'); return; }
        if (pw.length < 6) { showErr('Adgangskoden skal være mindst 6 tegn'); return; }
        if (pw !== pw2) { showErr('Adgangskoderne matcher ikke'); return; }
        if (!terms) { showErr('Du skal acceptere vilkårene'); return; }

        btn.disabled = true; btn.textContent = 'Opretter konto...';

        const { data, error } = await sb.auth.signUp({
            email,
            password: pw,
            options: { data: { name } }
        });

        if (error) {
            showErr(error.message.includes('already registered') ? 'Denne email er allerede registreret' : error.message);
            btn.disabled = false; btn.textContent = 'Opret gratis konto';
            return;
        }

        // Opdater profil med telefon
        if (data.user && phone) {
            await sb.from('profiles').update({ phone }).eq('id', data.user.id);
        }

        // Auto login
        localStorage.setItem('userLoggedIn', 'true');
        localStorage.setItem('userId', data.user.id);
        localStorage.setItem('userEmail', email);
        localStorage.setItem('userName', name);

        document.getElementById('formContent').style.display = 'none';
        const ok = document.getElementById('ok');
        ok.textContent = '✅ Konto oprettet! Du bliver omdirigeret...';
        ok.style.display = 'block';

        setTimeout(() => window.location.href = 'index.html', 1500);
    }

    function showErr(msg) {
        const el = document.getElementById('err');
        el.textContent = msg; el.style.display = 'block';
    }
</script>
</body>
</html>
