<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log ind - BikerBasen</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* HEADER */
        header {
            background: white;
            border-bottom: 1px solid #e0e0e0;
            padding: 1.5rem 2rem;
        }

        .header-content {
            max-width: 400px;
            margin: 0 auto;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: #ff6600;
            text-decoration: none;
            display: inline-block;
        }

        .logo:hover {
            opacity: 0.8;
        }

        /* MAIN CONTENT */
        .login-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .login-box {
            background: white;
            border-radius: 8px;
            padding: 2.5rem;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }

        .login-title {
            font-size: 24px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 0.5rem;
            text-align: center;
        }

        .login-subtitle {
            font-size: 14px;
            color: #999;
            text-align: center;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #333;
            margin-bottom: 0.5rem;
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            font-family: 'Roboto', sans-serif;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #ff6600;
            box-shadow: 0 0 0 3px rgba(255, 102, 0, 0.1);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            font-size: 13px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #ff6600;
        }

        .checkbox-group label {
            cursor: pointer;
            margin: 0;
            color: #666;
        }

        .forgot-password {
            text-align: right;
            margin-bottom: 1.5rem;
        }

        .forgot-password a {
            font-size: 13px;
            color: #0066cc;
            text-decoration: none;
            transition: color 0.3s;
        }

        .forgot-password a:hover {
            color: #ff6600;
        }

        .login-button {
            width: 100%;
            padding: 12px;
            background: #ff6600;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            font-family: 'Roboto', sans-serif;
        }

        .login-button:hover {
            background: #e55a00;
        }

        .login-button:active {
            transform: scale(0.98);
        }

        .divider {
            text-align: center;
            margin: 1.5rem 0;
            font-size: 13px;
            color: #999;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #e0e0e0;
        }

        .divider span {
            background: white;
            padding: 0 0.5rem;
            position: relative;
        }

        .signup-section {
            text-align: center;
            font-size: 13px;
            color: #666;
        }

        .signup-section a {
            color: #ff6600;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .signup-section a:hover {
            color: #e55a00;
        }

        /* SOCIAL LOGIN */
        .social-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .social-button {
            padding: 10px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .social-button:hover {
            border-color: #ff6600;
            background: #fff9f5;
        }

        /* RESPONSIVE */
        @media (max-width: 600px) {
            header {
                padding: 1rem;
            }

            .login-box {
                padding: 1.5rem;
                border-radius: 8px;
            }

            .login-title {
                font-size: 20px;
            }

            .login-container {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <header>
        <div class="header-content">
            <a href="index.html" class="logo">BikerBasen</a>
        </div>
    </header>

    <!-- LOGIN CONTAINER -->
    <div class="login-container">
        <div class="login-box">
            <h1 class="login-title">Log ind</h1>
            <p class="login-subtitle">eller opret en gratis konto</p>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input 
                        type="email" 
                        id="email" 
                        placeholder="din@email.dk" 
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Adgangskode</label>
                    <input 
                        type="password" 
                        id="password" 
                        placeholder="Mindst 6 karakterer" 
                        required
                    >
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="remember">
                    <label for="remember">Husk mig</label>
                </div>

                <div class="forgot-password">
                    <a href="#forgot">Glemt adgangskode?</a>
                </div>

                <button type="submit" class="login-button">Log ind</button>
            </form>

            <div class="divider">
                <span>eller</span>
            </div>

            <div class="social-buttons">
                <button class="social-button" onclick="loginWith('Google')">
                    🔵 Google
                </button>
                <button class="social-button" onclick="loginWith('Facebook')">
                    👤 Facebook
                </button>
            </div>

            <div class="signup-section">
                Har du ikke en konto? 
                <a href="signup.html">Opret her</a>
            </div>
        </div>
    </div>

    <script>
        function handleLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;

            if (email && password) {
                // Simuler login
                localStorage.setItem('userEmail', email);
                if (remember) {
                    localStorage.setItem('rememberMe', 'true');
                }
                
                alert(`Velkommen tilbage, ${email}!`);
                window.location.href = 'index.html';
            }
        }

        function loginWith(provider) {
            alert(`Log ind med ${provider} ville blive implementeret her`);
        }

        // Pre-fill email hvis brugeren blev husket
        window.addEventListener('load', function() {
            if (localStorage.getItem('rememberMe') === 'true') {
                const savedEmail = localStorage.getItem('userEmail');
                if (savedEmail) {
                    document.getElementById('email').value = savedEmail;
                    document.getElementById('remember').checked = true;
                }
            }
        });
    </script>
</body>
</html>
